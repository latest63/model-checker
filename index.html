<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Access Checker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: #0d0d0d;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .container { width: 100%; max-width: 720px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }

  /* Input section */
  .inputs { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .input-group {
    display: flex; flex-direction: column; gap: 4px;
  }
  .input-group label {
    font-size: 12px; font-weight: 500; color: #aaa;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .input-group input {
    background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
    color: #e0e0e0; font-size: 14px; padding: 10px 14px;
    font-family: 'Menlo', 'JetBrains Mono', monospace;
    transition: border-color 0.15s;
  }
  .input-group input:focus {
    outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
  }
  .input-group input::placeholder { color: #555; }

  .btn-row { display: flex; gap: 8px; align-items: center; }
  .btn {
    background: #6366f1; color: #fff; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 500; padding: 10px 24px; cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #5558e6; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary {
    background: transparent; border: 1px solid #333; color: #aaa;
  }
  .btn-secondary:hover { border-color: #555; color: #e0e0e0; }

  .status { font-size: 13px; color: #888; margin-bottom: 16px; min-height: 20px; }

  /* Model cards */
  .model-list { display: flex; flex-direction: column; gap: 8px; }

  .model-card {
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px;
    padding: 14px 16px; display: flex; align-items: center; gap: 12px;
    transition: border-color 0.2s;
  }
  .model-card.usable { border-left: 3px solid #22c55e; }
  .model-card.unusable { border-left: 3px solid #ef4444; }
  .model-card.checking { border-left: 3px solid #f59e0b; opacity: 0.7; }
  .model-card.skipped { border-left: 3px solid #555; opacity: 0.5; }

  .model-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .usable .model-icon { background: rgba(34,197,94,0.15); }
  .unusable .model-icon { background: rgba(239,68,68,0.15); }
  .checking .model-icon { background: rgba(245,158,11,0.15); }
  .skipped .model-icon { background: rgba(85,85,85,0.15); }

  .model-info { flex: 1; min-width: 0; }
  .model-name {
    font-size: 14px; font-weight: 500; font-family: 'Menlo', 'JetBrains Mono', monospace;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .model-meta { font-size: 11px; color: #666; margin-top: 2px; }

  .model-badge {
    font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px;
    flex-shrink: 0;
  }
  .usable .model-badge { background: rgba(34,197,94,0.15); color: #22c55e; }
  .unusable .model-badge { background: rgba(239,68,68,0.15); color: #ef4444; }
  .checking .model-badge { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .skipped .model-badge { background: rgba(85,85,85,0.15); color: #666; }

  .summary-bar {
    display: flex; gap: 16px; padding: 12px 0; font-size: 13px;
  }
  .summary-bar span { color: #888; }
  .summary-bar .green { color: #22c55e; font-weight: 600; }
  .summary-bar .red { color: #ef4444; font-weight: 600; }
  .summary-bar .yellow { color: #f59e0b; font-weight: 600; }

  .error-msg {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px; padding: 12px 16px; color: #fca5a5; font-size: 13px;
    margin-bottom: 12px;
  }

  .testing-note {
    font-size: 12px; color: #666; margin-top: 12px; text-align: center;
  }

  @media (max-width: 500px) {
    body { padding: 20px 12px; }
    .model-card { flex-wrap: wrap; }
    .model-badge { font-size: 10px; padding: 3px 8px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🧪 Model Access Checker</h1>
  <p class="subtitle">Paste an API key + base URL to see which models you can actually use</p>

  <div class="inputs">
    <div class="input-group">
      <label for="baseUrl">Base URL</label>
      <input type="url" id="baseUrl" placeholder="https://api.openai.com/v1" value="https://api.openai.com/v1">
    </div>
    <div class="input-group">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="sk-...">
    </div>
    <div class="btn-row">
      <button class="btn" id="checkBtn">Check Models</button>
      <button class="btn btn-secondary" id="clearBtn">Clear</button>
    </div>
  </div>

  <div id="status" class="status"></div>
  <div id="errorRegion"></div>
  <div id="summary" class="summary-bar"></div>
  <div id="modelList" class="model-list"></div>
  <div id="testingNote" class="testing-note"></div>
</div>

<script>
const baseUrlInput = document.getElementById('baseUrl');
const apiKeyInput = document.getElementById('apiKey');
const checkBtn = document.getElementById('checkBtn');
const clearBtn = document.getElementById('clearBtn');
const statusEl = document.getElementById('status');
const errorRegion = document.getElementById('errorRegion');
const summaryEl = document.getElementById('summary');
const modelList = document.getElementById('modelList');
const testingNote = document.getElementById('testingNote');

let cancelled = false;
let aborter = null;

clearBtn.addEventListener('click', () => {
  apiKeyInput.value = '';
  modelList.innerHTML = '';
  summaryEl.innerHTML = '';
  statusEl.textContent = '';
  errorRegion.innerHTML = '';
  testingNote.textContent = '';
  cancelled = true;
  if (aborter) aborter.abort();
});

checkBtn.addEventListener('click', runCheck);

function showError(msg) {
  errorRegion.innerHTML = `<div class="error-msg">⚠ ${msg}</div>`;
}

function normalizeBaseUrl(url) {
  url = url.replace(/\/+$/, '');
  return url;
}

async function runCheck() {
  let baseUrl = baseUrlInput.value.trim();
  const apiKey = apiKeyInput.value.trim();

  if (!baseUrl || !apiKey) {
    showError('Both Base URL and API Key are required.');
    return;
  }

  baseUrl = normalizeBaseUrl(baseUrl);
  cancelled = false;
  aborter = new AbortController();

  checkBtn.disabled = true;
  modelList.innerHTML = '';
  summaryEl.innerHTML = '';
  errorRegion.innerHTML = '';
  testingNote.textContent = '';
  statusEl.textContent = '⏳ Fetching model list...';

  try {
    // Step 1: fetch model list
    const modelsRes = await fetch(`${baseUrl}/models`, {
      headers: { 'Authorization': `Bearer ${apiKey}` },
      signal: aborter.signal
    });

    if (!modelsRes.ok) {
      const errText = await modelsRes.text().catch(() => '');
      let detail = `HTTP ${modelsRes.status}`;
      if (errText) {
        try {
          const errJson = JSON.parse(errText);
          detail = errJson.error?.message || detail;
        } catch { detail = errText.slice(0, 200); }
      }
      throw new Error(`${modelsRes.status} ${modelsRes.statusText} — ${detail}`);
    }

    const modelsData = await modelsRes.json();
    let models = modelsData.data || modelsData;

    if (!Array.isArray(models)) {
      throw new Error('Unexpected response format from /v1/models');
    }

    // Filter to chat-capable models (skip embeddings, TTS, etc.)
    // We'll test everything, but group chat models first
    const modelIds = models.map(m => typeof m === 'string' ? m : m.id);

    if (modelIds.length === 0) {
      statusEl.textContent = '⚠ No models returned by this endpoint.';
      checkBtn.disabled = false;
      return;
    }

    statusEl.textContent = `📋 Found ${modelIds.length} models — testing each one...`;
    testingNote.textContent = 'Each model gets a tiny test prompt (1 token reply) to verify actual access.';

    // Render all cards as "checking" state
    const results = new Map();

    for (const m of models) {
      const id = typeof m === 'string' ? m : m.id;
      results.set(id, { status: 'pending' });
    }

    renderResults(results);

    // Step 2: Test each model
    const testBody = {
      model: '',  // filled per-request
      messages: [{ role: 'user', content: 'hi' }],
      max_tokens: 1,
      stream: false
    };

    let usableCount = 0;
    let unusableCount = 0;
    let skippedCount = 0;
    const errors = [];
    let modelNumber = 0;

    for (const m of models) {
      if (cancelled) break;
      const id = typeof m === 'string' ? m : m.id;
      modelNumber++;

      // Skip known non-chat models to save time
      const lower = id.toLowerCase();
      if (lower.includes('embedding') || lower.includes('tts') || lower.includes('whisper') ||
          lower.includes('davinci') || lower.includes('babbage') || lower.includes('curie') ||
          lower.includes('ada') || lower.includes('moderation') || lower.includes('dall') ||
          lower.includes('009') || lower.includes('002') || lower.includes('001') ||
          lower.includes('knn') || lower.includes('rerank')) {
        results.set(id, { status: 'skipped', reason: 'non-chat model' });
        skippedCount++;
        updateCard(id, 'skipped', 'Skipped');
        statusEl.textContent = `📋 ${modelNumber}/${modelIds.length} — skipped ${id} (non-chat)`;
        continue;
      }

      statusEl.textContent = `🧪 ${modelNumber}/${modelIds.length} — testing ${id}...`;
      updateCard(id, 'checking', 'Testing...');

      try {
        testBody.model = id;
        const testRes = await fetch(`${baseUrl}/chat/completions`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(testBody),
          signal: aborter.signal
        });

        if (testRes.ok) {
          results.set(id, { status: 'usable' });
          usableCount++;
          updateCard(id, 'usable', '✅ Usable');
        } else {
          const errText = await testRes.text().catch(() => '');
          let reason = `HTTP ${testRes.status}`;
          if (errText) {
            try {
              const errJson = JSON.parse(errText);
              reason = errJson.error?.message || reason;
            } catch { reason = errText.slice(0, 150); }
          }
          results.set(id, { status: 'unusable', reason });
          unusableCount++;
          updateCard(id, 'unusable', '❌ Blocked');
          errors.push({ id, reason });
        }
      } catch (err) {
        if (err.name === 'AbortError') break;
        results.set(id, { status: 'unusable', reason: err.message });
        unusableCount++;
        updateCard(id, 'unusable', '❌ Error');
        errors.push({ id, reason: err.message });
      }
    }

    if (cancelled) {
      statusEl.textContent = '⏹ Cancelled.';
      checkBtn.disabled = false;
      return;
    }

    // Summary
    const total = modelIds.length;
    const summaryHTML = `
      <span>Total: <strong>${total}</strong></span>
      <span class="green">✅ Usable: ${usableCount}</span>
      <span class="red">❌ Blocked: ${unusableCount}</span>
      <span style="color:#666">⏭ Skipped: ${skippedCount}</span>
    `;
    summaryEl.innerHTML = summaryHTML;
    statusEl.textContent = usableCount > 0
      ? `✅ Done! ${usableCount} model${usableCount > 1 ? 's' : ''} you can actually use.`
      : unusableCount > 0
        ? '😬 None of the chat models responded. Your key may not have access to any of them.'
        : '⚠ No chat models found to test.';

    testingNote.textContent = '';

    // Show errors summary if any unusable
    if (errors.length > 0) {
      const uniqueErrors = [...new Set(errors.map(e => e.reason))];
      if (uniqueErrors.length <= 3) {
        showError(uniqueErrors.join(' | '));
      } else {
        const top = uniqueErrors.slice(0, 3);
        showError(`${top.join(' | ')} (and ${uniqueErrors.length - 3} more)`);
      }
    }
  } catch (err) {
    if (err.name === 'AbortError') {
      statusEl.textContent = '⏹ Cancelled.';
    } else {
      showError(err.message);
      statusEl.textContent = '❌ Failed.';
    }
  }

  checkBtn.disabled = false;
}

function renderResults(results) {
  modelList.innerHTML = '';
  for (const [id, data] of results) {
    const card = document.createElement('div');
    card.className = 'model-card checking';
    card.id = `card-${cssEscape(id)}`;
    card.innerHTML = `
      <div class="model-icon">⏳</div>
      <div class="model-info">
        <div class="model-name">${escapeHtml(id)}</div>
        <div class="model-meta">checking...</div>
      </div>
      <span class="model-badge">Testing...</span>
    `;
    modelList.appendChild(card);
  }
}

function updateCard(id, className, badgeText) {
  const safeId = `card-${cssEscape(id)}`;
  const card = document.getElementById(safeId);
  if (!card) return;

  card.className = `model-card ${className}`;
  const iconMap = {
    usable: '✅',
    unusable: '❌',
    checking: '⏳',
    skipped: '⏭'
  };
  card.querySelector('.model-icon').textContent = iconMap[className] || '•';
  card.querySelector('.model-badge').textContent = badgeText;
}

function cssEscape(str) {
  return str.replace(/[^\w-]/g, '_');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
